name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish
        env:
          # First-publish bootstrap: a granular npm token set as the NPM_TOKEN
          # repo secret. After the first publish lands, add the npmjs.com Trusted
          # Publisher, revoke the token, and remove this env line (OIDC takes over).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx -y npm@latest publish --provenance --access public
