name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      # OIDC trusted publishing — no token. Auth comes from the GitHub Actions
      # OIDC identity (id-token: write above) matched against the npmjs.com
      # Trusted Publisher configured for this repo + workflow. Provenance is
      # attested automatically.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
